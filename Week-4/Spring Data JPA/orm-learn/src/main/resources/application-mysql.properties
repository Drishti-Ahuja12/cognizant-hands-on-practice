# Activate with: mvn spring-boot:run "-Dspring-boot.run.profiles=mysql"
# Supply the real MySQL password with DB_PASSWORD; it is not assumed to be "root".
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ormlearn}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.sql.init.mode=never
