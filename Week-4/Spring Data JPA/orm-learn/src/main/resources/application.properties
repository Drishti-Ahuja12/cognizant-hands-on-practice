# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL and bind values
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %m%n

# Default database configuration: embedded H2, so the exercise runs immediately.
# Use the mysql profile for a local MySQL database (see application-mysql.properties).
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
